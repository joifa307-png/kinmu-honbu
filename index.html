<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>出勤簿（本部）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:#eae5e3;color:#37322f;min-height:100vh;line-height:1.5}
.app{max-width:1280px;margin:0 auto;padding:16px 20px 40px}

/* ヘッダー */
.header{background:#FCFBFA;border-radius:14px;padding:14px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(55,50,47,.06)}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.header-title-wrap{display:flex;flex-direction:column;gap:2px}
.app-title{font-size:1.15rem;font-weight:700;color:#0f6e56;line-height:1.2}
.app-version{font-size:.65rem;color:#b5aea8;font-weight:400;line-height:1}
.header-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.btn{border:2px solid #d8d2ce;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:600;background:#fff;color:#37322f;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
a.btn-link{border:2px solid #d8d2ce;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:600;background:#fff;color:#185fa5;text-decoration:none;text-align:center;font-family:inherit;transition:all .15s;white-space:nowrap;display:inline-block}
a.btn-link:hover{border-color:#185fa5;color:#134a82}
.facility-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.facility-row .btn-link{flex:0 0 auto}
.btn:hover{border-color:#0f6e56;color:#0f6e56}
.btn-primary{background:#0f6e56;border-color:#0f6e56;color:#fff}
.btn-primary:hover{background:#0d5c47;border-color:#0d5c47;color:#fff}
.btn:disabled{opacity:.4;cursor:default}
.period-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.period-nav button{background:none;border:none;font-size:1.6rem;color:#0f6e56;padding:4px 14px;cursor:pointer;line-height:1}
.period-nav button:disabled{opacity:.3;cursor:default}
.period-label{font-size:1rem;font-weight:700;min-width:10em;text-align:center}
.facility-filter{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;flex:1 1 auto}
.fac-chip{border:2px solid #d8d2ce;border-radius:20px;padding:6px 14px;font-size:.82rem;font-weight:600;background:#fff;cursor:pointer;transition:all .15s}
.fac-chip.active{border-color:#0f6e56;background:#dcefe2;color:#0f6e56}

/* タブ */
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{flex:1;max-width:200px;padding:10px 12px;border:none;border-radius:10px 10px 0 0;background:#e8e4e1;font-size:.88rem;font-weight:600;color:#6b6562;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:#FCFBFA;color:#0f6e56;box-shadow:0 -1px 3px rgba(55,50,47,.04)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* カード・テーブル */
.card{background:#FCFBFA;border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(55,50,47,.06)}
.status-msg{text-align:center;padding:32px 16px;color:#6b6562;font-size:.9rem}
.status-msg.error{color:#a32d2d}
.retry-btn{margin-top:12px;padding:8px 20px;border:2px solid #d8d2ce;border-radius:20px;background:#fff;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{text-align:left;padding:10px 8px;border-bottom:2px solid #e8e4e1;font-weight:700;color:#6b6562;white-space:nowrap;background:#FCFBFA;position:sticky;top:0}
tbody td{padding:9px 8px;border-bottom:1px solid #f0ece9;vertical-align:middle}
tbody tr.sum-row{cursor:pointer;transition:background .12s}
tbody tr.sum-row:hover{background:#f5f3f1}
tbody tr.sum-row.expanded{background:#f8fcf9}
.num{text-align:right;font-variant-numeric:tabular-nums}
.note-mark{color:#854f0b;font-weight:700;margin-right:4px}
.today-count{font-size:.9rem;font-weight:600;color:#0f6e56;margin-bottom:12px}
.today-count span{font-size:1.05rem}
.dup-alert{background:#fcebeb;border:2px solid #e8b4b4;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:.85rem;color:#a32d2d}
.dup-alert-title{font-weight:700;margin-bottom:6px}
.dup-alert ul{margin:0;padding-left:1.2em}
.dup-alert li{margin:3px 0;line-height:1.5}
.dup-row,.dup-row td{color:#a32d2d!important;font-weight:600}
.detail-table tr.dup-row td{color:#a32d2d!important;font-weight:600}
.dup-mark{color:#a32d2d;font-weight:700;margin-right:4px}
.memo-alert{background:#e6f1fb;border:2px solid #b8d4f0;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:.85rem}
.memo-alert-title{font-weight:700;margin-bottom:8px;color:#185fa5}
.memo-card{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid #d0e3f5}
.memo-card:last-child{border-bottom:none;padding-bottom:0}
.memo-card:first-of-type{padding-top:0}
.memo-card-body{flex:1;min-width:0}
.memo-card-meta{font-weight:600;color:#1f6feb;margin-bottom:2px}
.memo-card-text{color:#1f6feb;line-height:1.5;word-break:break-word}
.btn-memo-confirm{flex:0 0 auto;padding:6px 12px;font-size:.78rem;border:2px solid #b8d4f0;background:#fff;color:#185fa5;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap}
.btn-memo-confirm:hover{border-color:#185fa5;background:#f5faff}
.btn-memo-confirm:disabled{opacity:.5;cursor:default}

/* 行展開明細 */
.detail-row td{padding:0;border-bottom:1px solid #e8e4e1;background:#faf9f8}
.detail-inner{padding:8px 12px 12px 28px}
.detail-table{width:100%;font-size:.78rem}
.detail-table th{padding:6px 8px;color:#6b6562;font-weight:600;border-bottom:1px solid #ece8e5}
.detail-table td{padding:6px 8px;border-bottom:1px solid #f5f3f1}
.tag{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px}
.tag-work{background:#dcefe2;color:#0f6e56}
.tag-hol{background:#faeeda;color:#854f0b}
.tag-paid{background:#e6f1fb;color:#185fa5}
.tag-abs{background:#fcebeb;color:#a32d2d}
.chevron{display:inline-block;width:1em;color:#9a9490;transition:transform .15s}
.sum-row.expanded .chevron{transform:rotate(90deg)}

/* 個人明細 */
.personal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.personal-toolbar label{font-size:.85rem;font-weight:600;color:#6b6562;white-space:nowrap}
.personal-staff-select{flex:1;min-width:180px;max-width:360px;border:2px solid #d8d2ce;border-radius:10px;padding:8px 12px;font-size:.88rem;font-family:inherit;background:#fff;color:#37322f}
.personal-staff-select:focus{outline:2px solid #0f6e56;outline-offset:0}
.personal-heading{font-size:.95rem;font-weight:700;margin-bottom:10px;line-height:1.6}
.personal-heading .sub{font-size:.82rem;font-weight:600;color:#6b6562}
.personal-detail-table{font-size:.8rem}
.personal-detail-table thead th{position:static}
.personal-detail-table .empty{color:#b5aea8}
.personal-totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px;padding-top:14px;border-top:2px solid #e8e4e1}
.personal-totals .tot-item{text-align:center}
.personal-totals .tot-val{font-size:1rem;font-weight:700;color:#0f6e56}
.personal-totals .tot-lbl{font-size:.72rem;color:#6b6562;margin-top:2px}
.personal-print-area{display:none}
.personal-page{margin-bottom:24px}
.personal-page-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.personal-page-sub{font-size:.85rem;color:#6b6562;margin-bottom:10px}
.btn-edit-rec{padding:4px 10px;font-size:.75rem}

/* 訂正モーダル */
.edit-overlay{position:fixed;inset:0;background:rgba(55,50,47,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow:auto}
.edit-overlay.open{display:flex}
.edit-modal{background:#FCFBFA;border-radius:14px;width:100%;max-width:520px;padding:18px 20px;margin:20px 0;box-shadow:0 4px 20px rgba(55,50,47,.15)}
.edit-modal h2{margin:0 0 14px;font-size:1.05rem;color:#0f6e56}
.edit-field{margin-bottom:12px}
.edit-field label{display:block;font-size:.82rem;font-weight:600;color:#6b6562;margin-bottom:4px}
.edit-field select,.edit-field input[type=text],.edit-field input[type=number],.edit-field textarea{width:100%;border:2px solid #d8d2ce;border-radius:10px;padding:8px 12px;font-size:.88rem;font-family:inherit;background:#fff;color:#37322f}
.edit-field textarea{min-height:64px;resize:vertical}
.edit-field input[readonly]{background:#f5f3f1;color:#6b6562}
.edit-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.edit-calc{background:#dcefe2;border-radius:10px;padding:10px 12px;font-size:.9rem;font-weight:600;color:#0f6e56;margin-bottom:12px}
.edit-check{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:600}
.edit-check input{width:18px;height:18px}
.edit-section{display:none}
.edit-section.show{display:block}
.edit-err{color:#a32d2d;font-size:.85rem;margin:8px 0;display:none}
.edit-err.show{display:block}
.edit-delete-wrap{margin-top:12px;padding-top:14px;border-top:1px solid #e8e4e1}
.btn-delete-rec{width:100%;background:#fff;border:2px solid #c4423a;color:#a32d2d;font-weight:600}
.btn-delete-rec:hover:not(:disabled){background:#fdf0ef;border-color:#a32d2d;color:#8b2520}
.btn-delete-rec:disabled{opacity:.55;cursor:not-allowed}
.edit-actions{display:flex;gap:10px;margin-top:16px}
.edit-actions .btn{flex:1}
.edit-hint{font-size:.78rem;color:#6b6562;margin-top:4px}

/* 印刷用 */
.print-title{display:none}
@media print{
  body{background:#fff}
  .app{max-width:none;padding:0}
  .header .header-actions,.tabs,.btn,.facility-filter,.period-nav button,.no-print{display:none!important}
  .header,.card{box-shadow:none;border-radius:0;padding:0}
  .tab-panel{display:none!important}
  body:not(.print-personal) .tab-panel[data-tab="summary"].active{display:block!important}
  body:not(.print-personal) .print-title{display:block!important;font-size:14pt;font-weight:700;margin-bottom:12px;text-align:center}
  body.print-personal .personal-print-area{display:block!important}
  body.print-personal .print-title{display:none!important}
  .personal-page{page-break-after:always}
  .personal-page:last-child{page-break-after:auto}
  .sum-row{cursor:default}
  .detail-row{display:none!important}
  table{font-size:9pt}
  thead th,tbody td{padding:4px 6px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header no-print">
    <div class="header-top">
      <div class="header-title-wrap">
        <div class="app-title">出勤簿（本部）</div>
        <span class="app-version" id="appVersion"></span>
      </div>
      <div class="header-actions">
        <button type="button" class="btn" id="btnCsv">CSV出力</button>
        <button type="button" class="btn" id="btnXlsx">Excel出力</button>
        <button type="button" class="btn" id="btnPrint">印刷</button>
        <button type="button" class="btn btn-primary" id="btnReload">再読込</button>
      </div>
    </div>
    <div class="period-nav">
      <button type="button" id="btnPrevPeriod" aria-label="前月度">&#8249;</button>
      <div class="period-label" id="periodLabel"></div>
      <button type="button" id="btnNextPeriod" aria-label="翌月度">&#8250;</button>
    </div>
    <div class="facility-row">
      <a class="btn-link" href="https://joifa307-png.github.io/kinmu-honbu/staff/">スタッフ管理</a>
      <div class="facility-filter" id="facilityFilter"></div>
    </div>
  </header>

  <div class="tabs no-print">
    <button type="button" class="tab" data-tab="today">当日の出勤状況</button>
    <button type="button" class="tab active" data-tab="summary">月度集計</button>
    <button type="button" class="tab" data-tab="personal">個人明細</button>
  </div>

  <div class="print-title" id="printTitle"></div>

  <div class="tab-panel" data-tab="today" id="panelToday">
    <div class="card">
      <div class="today-count" id="todayCount" style="display:none"></div>
      <div id="todayDupAlert" style="display:none"></div>
      <div id="todayMemoAlert" style="display:none"></div>
      <div id="todayStatus" class="status-msg">読み込み中…</div>
      <div class="table-wrap" id="todayTableWrap" style="display:none">
        <table id="todayTable">
          <thead>
            <tr>
              <th>氏名</th>
              <th>所属</th>
              <th>区分</th>
              <th>シフト</th>
              <th class="num">実働</th>
              <th class="num">残業</th>
              <th>特記事項</th>
            </tr>
          </thead>
          <tbody id="todayBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="tab-panel active" data-tab="summary" id="panelSummary">
    <div class="card">
      <div id="summaryDupAlert" style="display:none"></div>
      <div id="summaryMemoAlert" style="display:none"></div>
      <div id="summaryStatus" class="status-msg">読み込み中…</div>
      <div class="table-wrap" id="summaryTableWrap" style="display:none">
        <table id="summaryTable">
          <thead>
            <tr>
              <th></th>
              <th>氏名</th>
              <th>所属</th>
              <th>職種</th>
              <th class="num">出勤日数</th>
              <th class="num">休出日数</th>
              <th class="num">有休日数</th>
              <th class="num">欠勤日数</th>
              <th class="num">実働合計</th>
              <th class="num">残業合計</th>
              <th class="num">遅早回数</th>
              <th class="num">有給残</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="tab-panel" data-tab="personal" id="panelPersonal">
    <div class="card">
      <div class="personal-toolbar no-print">
        <label for="personalStaffSelect">スタッフ選択</label>
        <select id="personalStaffSelect" class="personal-staff-select">
          <option value="">— 選択してください —</option>
        </select>
      </div>
      <div id="personalStatus" class="status-msg" style="display:none"></div>
      <div id="personalContent" style="display:none">
        <div class="personal-heading" id="personalHeading"></div>
        <div class="table-wrap">
          <table class="personal-detail-table" id="personalTable">
            <thead>
              <tr>
                <th>日付</th>
                <th>曜日</th>
                <th>区分</th>
                <th>シフト名</th>
                <th>時間</th>
                <th class="num">休憩</th>
                <th class="num">実働</th>
                <th class="num">残業</th>
                <th>備考</th>
                <th class="no-print">訂正</th>
              </tr>
            </thead>
            <tbody id="personalBody"></tbody>
          </table>
        </div>
        <div class="personal-totals" id="personalTotals"></div>
      </div>
    </div>
  </div>

  <div id="personalPrintArea" class="personal-print-area" aria-hidden="true"></div>
</div>

<div class="edit-overlay no-print" id="editOverlay" aria-hidden="true">
  <div class="edit-modal" role="dialog" aria-labelledby="editModalTitle">
    <h2 id="editModalTitle">記録の訂正</h2>
    <div class="edit-field">
      <label for="editDate">日付</label>
      <input type="text" id="editDate" readonly>
    </div>
    <div class="edit-field">
      <label for="editStatus">区分</label>
      <select id="editStatus">
        <option value="work">勤務</option>
        <option value="paid_leave">有給</option>
        <option value="absence">欠勤</option>
      </select>
      <p class="edit-hint" id="editPaidHint" style="display:none">有給の承認状態（申請中・承認済み）は変更しません。</p>
    </div>
    <div class="edit-section" id="editWorkSection">
      <div class="edit-field">
        <label for="editShift">シフト</label>
        <select id="editShift"></select>
      </div>
      <div class="edit-row2">
        <div class="edit-field">
          <label for="editStart">開始</label>
          <select id="editStart"></select>
        </div>
        <div class="edit-field">
          <label for="editEnd">終了</label>
          <select id="editEnd"></select>
        </div>
      </div>
      <div class="edit-field">
        <label for="editBreak">休憩（分）</label>
        <input type="number" id="editBreak" min="0" step="10" inputmode="numeric">
      </div>
      <div class="edit-calc" id="editCalc">実働 —　残業 —</div>
      <div class="edit-field">
        <label class="edit-check"><input type="checkbox" id="editHolidayWorkFlag"> 休日出勤（本来の休みに出た日）</label>
      </div>
      <div class="edit-field">
        <label class="edit-check"><input type="checkbox" id="editLateFlag"> 遅刻・早退</label>
      </div>
      <div class="edit-field" id="editLateNoteWrap" style="display:none">
        <label for="editLateNote">遅刻・早退の理由</label>
        <input type="text" id="editLateNote" maxlength="200">
      </div>
      <div class="edit-section" id="editOtSection">
        <div class="edit-field">
          <label for="editOtReason">残業理由</label>
          <select id="editOtReason">
            <option value="">— 選択 —</option>
          </select>
        </div>
        <div class="edit-field" id="editOtNoteWrap" style="display:none">
          <label for="editOtNote">残業理由（その他）</label>
          <input type="text" id="editOtNote" maxlength="200">
        </div>
      </div>
    </div>
    <div class="edit-section" id="editAbsSection">
      <div class="edit-field">
        <label for="editAbsReason">欠勤理由</label>
        <select id="editAbsReason">
          <option value="">— 選択 —</option>
          <option value="sick">病欠</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="edit-field" id="editAbsNoteWrap" style="display:none">
        <label for="editAbsNote">欠勤理由（その他）</label>
        <input type="text" id="editAbsNote" maxlength="200">
      </div>
    </div>
    <div class="edit-field">
      <label for="editMemo">特記事項（memo）</label>
      <textarea id="editMemo" maxlength="500"></textarea>
    </div>
    <p class="edit-err" id="editErr"></p>
    <div class="edit-delete-wrap" id="editDeleteWrap">
      <button type="button" class="btn btn-delete-rec" id="editDelete">この記録を削除（公休に戻す）</button>
    </div>
    <div class="edit-actions">
      <button type="button" class="btn" id="editCancel">キャンセル</button>
      <button type="button" class="btn btn-primary" id="editSave">保存</button>
    </div>
  </div>
</div>

<script>
/* ── 定数 ── */
const APP_VERSION = '1.2.0';
const APP_VERSION_NOTES = '1.2.0 — 特記事項アラート／一括読込・月度キャッシュ／記録削除（公休に戻す）';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx24znbj2ThSj41D8mFX9adq70lyhyWAanJbZ6jGS3deDbgT2JRCy_fC9c65yAMgEg/exec';
const FACILITY_LABELS = { nishi: 'おひさま西', minami: '南のおひさま', hibari: 'ヘルパーステーションひばり・居宅ひばり', link: '有限会社リンク' };
const FACILITY_ORDER = ['nishi', 'minami', 'hibari', 'link'];
const FACILITY_SHORT = { all: '全て', nishi: '西', minami: '南', hibari: 'ひばり', link: 'リンク' };
const JOB_LABELS = { kaigo: '介護職員', kaigo_toku: '介護職員（特）', chori: '調理スタッフ', helper: 'ヘルパー（正）', caremane: 'ケアマネージャー', jimu: '事務スタッフ' };
const DOW_LABELS = ['日', '月', '火', '水', '木', '金', '土'];

const EXPORT_HEADERS = ['氏名', '所属', '職種', '出勤日数', '休出日数', '有休日数', '欠勤日数', '実働合計', '残業合計', '遅早回数', '有給残'];
const PERSONAL_HEADERS = ['日付', '曜日', '区分', 'シフト名', '時間', '休憩', '実働', '残業', '備考'];

/** 残業理由コード→表示名（後から追記可。未知コードはそのまま表示） */
const OVERTIME_REASON_LABEL = {
  care: '利用者対応',
  records: '記録・書類作成',
  meeting: '会議・研修',
  shortage: '人員不足・業務集中',
  other: 'その他'
};

const MINUTES_10 = [0, 10, 20, 30, 40, 50];
const OVERTIME_THRESHOLD_MIN = 60;

function shiftLabel(shiftKey) {
  return (shiftKey && shiftMaster[shiftKey]) ? shiftMaster[shiftKey].label : (shiftKey || '—');
}

/** おひさま西・南のおひさま：1日1名のはずのシフト（重複チェック対象） */
const WATCH_SHIFT_KEYS = new Set([
  'nishi_kaigo_chiban', 'nishi_kaigo_yakin', 'nishi_chori_a', 'nishi_chori_b',
  'minami_kaigo_chiban', 'minami_kaigo_yakin', 'minami_chori_a', 'minami_chori_b'
]);
const WATCH_FACILITIES = ['nishi', 'minami'];

function shiftFacility(shiftKey) {
  return shiftMaster[shiftKey]?.facilityId || '';
}

function staffById(staffId) {
  return staffMap[staffId] || staffMap[String(staffId)] || null;
}

function staffName(staffId) {
  const s = staffById(staffId);
  return s?.name || staffId || '—';
}

function recKey(rec) {
  return `${rec.date}_${rec.staffId}`;
}

function detectShiftDuplicates(records) {
  const dupRecordKeys = new Set();
  const alerts = [];
  const buckets = {};

  records.forEach(rec => {
    if (rec.status !== 'work' || !rec.date || !rec.shiftKey) return;
    if (!WATCH_SHIFT_KEYS.has(rec.shiftKey)) return;
    const key = `${rec.date}|${rec.shiftKey}`;
    if (!buckets[key]) buckets[key] = [];
    buckets[key].push(rec);
  });

  Object.keys(buckets).sort().forEach(key => {
    const group = buckets[key];
    if (group.length <= 1) return;
    const [date, shiftKey] = key.split('|');
    const facilityId = shiftFacility(shiftKey);
    group.forEach(r => dupRecordKeys.add(recKey(r)));
    alerts.push({
      date,
      facilityId,
      shiftKey,
      shiftLabel: shiftLabel(shiftKey),
      count: group.length,
      names: group.map(r => staffName(r.staffId))
    });
  });

  alerts.sort((a, b) => a.date.localeCompare(b.date) || a.facilityId.localeCompare(b.facilityId));
  return { dupRecordKeys, alerts };
}

function filterDupAlerts(alerts) {
  if (facilityFilter === 'all') return alerts.filter(a => WATCH_FACILITIES.includes(a.facilityId));
  return alerts.filter(a => a.facilityId === facilityFilter);
}

function renderDupAlert(elId, alerts) {
  const el = $(elId);
  const filtered = filterDupAlerts(alerts);
  if (!filtered.length) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  const lines = filtered.map(a =>
    `${fmtDateWithDow(a.date)} ${facilityLabel(a.facilityId)}：${a.shiftLabel} ${a.count}名（${a.names.map(n => esc(n)).join('、')}）`
  );
  el.style.display = 'block';
  el.innerHTML = `<div class="dup-alert"><div class="dup-alert-title">⚠ シフト重複（入力ミスの可能性）</div><ul>${lines.map(l => `<li>${l}</li>`).join('')}</ul></div>`;
}

function isDupRecord(rec, dupRecordKeys) {
  return dupRecordKeys.has(recKey(rec));
}

const MEMO_CONFIRMED_MARK = '【確認済】';

function filterMemoItems(records) {
  const items = [];
  records.forEach(rec => {
    const memo = rec.memo && String(rec.memo).trim();
    if (!memo || memo.includes(MEMO_CONFIRMED_MARK)) return;
    const staff = staffById(rec.staffId);
    if (facilityFilter !== 'all' && (!staff || staff.facilityId !== facilityFilter)) return;
    items.push({ rec, memo });
  });
  items.sort((a, b) => {
    const dc = (a.rec.date || '').localeCompare(b.rec.date || '');
    if (dc !== 0) return dc;
    return staffName(a.rec.staffId).localeCompare(staffName(b.rec.staffId), 'ja');
  });
  return items;
}

function renderMemoAlert(elId, records) {
  const el = $(elId);
  const items = filterMemoItems(records);
  if (!items.length) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  const cards = items.map(({ rec, memo }) => `
    <div class="memo-card">
      <div class="memo-card-body">
        <div class="memo-card-meta">${fmtDateWithDow(rec.date)}　${esc(staffName(rec.staffId))}</div>

      <button type="button" class="btn-memo-confirm" data-date="${esc(rec.date)}" data-staff-id="${esc(String(rec.staffId))}">確認済み</button>
    </div>
  `).join('');
  el.style.display = 'block';
  el.innerHTML = `<div class="memo-alert"><div class="memo-alert-title">特記事項</div>${cards}</div>`;
  el.querySelectorAll('.btn-memo-confirm').forEach(btn => {
    btn.addEventListener('click', () => confirmMemoRecord(btn.getAttribute('data-date'), btn.getAttribute('data-staff-id'), btn));
  });
}

function applyMemoConfirmed(memo) {
  const m = String(memo || '').trim();
  if (!m || m.includes(MEMO_CONFIRMED_MARK)) return m;
  return `${MEMO_CONFIRMED_MARK}${m}`;
}

function findRecord(date, staffId) {
  const key = String(staffId);
  return periodRecords.find(r => r.date === date && String(r.staffId) === key)
    || todayRecords.find(r => r.date === date && String(r.staffId) === key)
    || null;
}

function updateRecordInCache(saved) {
  [periodRecords, todayRecords].forEach(arr => {
    const idx = arr.findIndex(r => r.date === saved.date && String(r.staffId) === String(saved.staffId));
    if (idx >= 0) arr[idx] = saved;
  });
  syncPeriodCacheFromMemory();
}

function removeRecordFromCache(date, staffId) {
  const match = r => r.date === date && String(r.staffId) === String(staffId);
  [periodRecords, todayRecords].forEach(arr => {
    for (let i = arr.length - 1; i >= 0; i--) {
      if (match(arr[i])) arr.splice(i, 1);
    }
  });
  Object.keys(paidLeaveRecordsMap).forEach(sid => {
    if (String(sid) === String(staffId)) {
      paidLeaveRecordsMap[sid] = paidLeaveRecordsMap[sid].filter(r => !match(r));
    }
  });
  syncPeriodCacheFromMemory();
}

function formatDeleteError(msg) {
  const m = String(msg || '').trim();
  if (!m) return '削除できませんでした。';
  if (/承認済|approved|有給.*削除/i.test(m)) return m;
  if (m.includes('paid_leave') || m.includes('approvalStatus')) {
    return '承認済みの有給は削除できません。';
  }
  return m;
}

async function confirmMemoRecord(date, staffId, btn) {
  const rec = findRecord(date, staffId);
  if (!rec) return;
  const msg = 'この特記事項を確認済みにします。一覧から消えますが、記録には「【確認済】」付きで残ります。よろしいですか？';
  if (!confirm(msg)) return;
  const newMemo = applyMemoConfirmed(rec.memo);
  const payload = { ...rec, memo: newMemo };
  if (btn) btn.disabled = true;
  try {
    const data = await postToGas(payload);
    if (!data || !data.ok) throw new Error(data?.error || '保存に失敗しました。');
    const saved = data.record || payload;
    updateRecordInCache(saved);
    renderToday();
    renderSummary();
    renderPersonal();
  } catch (e) {
    if (btn) btn.disabled = false;
    alert('確認済みの保存に失敗しました：' + (e.message || e));
  }
}

/* ── 締め期間（月度） ── */
function todayStr() {
  const d = new Date();
  return ymd(d);
}

function ymd(dt) {
  if (typeof dt === 'string') return dt;
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
}

function getPeriod(baseDate) {
  const d = baseDate || todayStr();
  const [y, m, day] = d.split('-').map(Number);
  let periodYear, periodMonth;
  if (day >= 11) {
    periodYear = y;
    periodMonth = m;
  } else {
    const prev = new Date(y, m - 2, 1);
    periodYear = prev.getFullYear();
    periodMonth = prev.getMonth() + 1;
  }
  const from = `${periodYear}-${String(periodMonth).padStart(2, '0')}-11`;
  const endDt = new Date(periodYear, periodMonth, 10);
  const to = ymd(endDt);
  const tm = endDt.getMonth() + 1;
  const td = endDt.getDate();
  return {
    label: `${periodYear}年${periodMonth}月度`,
    ym: `${periodYear}-${String(periodMonth).padStart(2, '0')}`,
    from,
    to,
    periodYear,
    periodMonth,
    rangeLabel: `${periodMonth}/11〜${tm}/${td}`
  };
}

function prevPeriod(p) {
  const dt = new Date(p.periodYear, p.periodMonth - 2, 15);
  return getPeriod(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-15`);
}

function nextPeriod(p) {
  const dt = new Date(p.periodYear, p.periodMonth, 15);
  return getPeriod(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-15`);
}

function fmtDateWithDow(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return `${m}/${d}（${DOW_LABELS[dt.getDay()]}）`;
}

/* ── 表示・集計ヘルパー ── */
const H = m => (Number(m) / 60).toFixed(1) + 'H';
const Hnum = m => parseFloat((Number(m) / 60).toFixed(1));

function fmtClock(min) {
  const h = Math.floor(Number(min) / 60) % 24;
  const m = Number(min) % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
}

function fmtTimeRange(start, end) {
  if (start == null || end == null) return '—';
  const s = Number(start);
  const e = Number(end);
  if (isNaN(s) || isNaN(e)) return '—';
  if (e <= s) return `${fmtClock(s)}〜翌${fmtClock(e)}`;
  return `${fmtClock(s)}〜${fmtClock(e)}`;
}

function fmtDurJa(min) {
  const n = Number(min) || 0;
  if (n <= 0) return '—';
  const h = Math.floor(n / 60);
  const m = n % 60;
  if (h === 0) return `${m}分`;
  if (m === 0) return `${h}h`;
  return `${h}h${m}分`;
}

/* ── 計算（スタッフ入力アプリと同一） ── */
function spanMin(start, end) {
  let s = end - start;
  if (s <= 0) s += 1440;
  return s;
}
function computeWorkMin(start, end, breakMin) {
  return spanMin(start, end) - breakMin;
}
function computeOvertime(actualWorkMin, shiftWorkMin) {
  return Math.max(0, actualWorkMin - shiftWorkMin);
}

function isEmpty(v) {
  if (v === null || v === undefined) return true;
  if (typeof v === 'string' && v.trim() === '') return true;
  return false;
}

function shiftsForStaff(staff) {
  if (!staff) return [];
  return Object.values(shiftMaster)
    .filter(s => s.active && s.facilityId === staff.facilityId && s.jobType === staff.jobType)
    .sort((a, b) => a.order - b.order);
}

function buildTimeSelectOptions() {
  const opts = [];
  for (let h = 0; h < 24; h++) {
    for (const m of MINUTES_10) {
      const min = h * 60 + m;
      opts.push({ min, label: fmtClock(min) });
    }
  }
  return opts;
}

function fillTimeSelect(el, includeNextDay) {
  const opts = buildTimeSelectOptions();
  el.innerHTML = '';
  if (includeNextDay) {
    const gDay = document.createElement('optgroup');
    gDay.label = '当日';
    opts.forEach(o => {
      const opt = document.createElement('option');
      opt.value = `d:${o.min}`;
      opt.textContent = o.label;
      gDay.appendChild(opt);
    });
    el.appendChild(gDay);
    const gNext = document.createElement('optgroup');
    gNext.label = '翌日';
    opts.forEach(o => {
      const opt = document.createElement('option');
      opt.value = `n:${o.min}`;
      opt.textContent = `翌 ${o.label}`;
      gNext.appendChild(opt);
    });
    el.appendChild(gNext);
  } else {
    opts.forEach(o => {
      const opt = document.createElement('option');
      opt.value = String(o.min);
      opt.textContent = o.label;
      el.appendChild(opt);
    });
  }
}

function parseEndSelectValue(val) {
  if (!val) return 0;
  if (val.includes(':')) return Number(val.split(':')[1]) || 0;
  return Number(val) || 0;
}

function endSelectValue(startMin, endMin) {
  if (endMin <= startMin) return `n:${endMin}`;
  return `d:${endMin}`;
}

function periodDates(from, to) {
  const dates = [];
  let d = from;
  while (d <= to) {
    dates.push(d);
    d = addDays(d, 1);
  }
  return dates;
}

function personalStatusLabel(rec) {
  if (!rec) return '—';
  if (rec.status === 'paid_leave') return '有給';
  if (rec.status === 'absence') return '欠勤';
  return '勤務';
}

function overtimeReasonLabel(raw) {
  if (raw == null || String(raw).trim() === '') return '';
  const s = String(raw).trim();
  if (OVERTIME_REASON_LABEL[s]) return OVERTIME_REASON_LABEL[s];
  if (/[\u3040-\u30ff\u4e00-\u9fff]/.test(s)) return s;
  return s;
}

function hasOvertimeReasonOrTime(rec) {
  return Number(rec.overtimeMin) > 0 || !!(rec.overtimeReason && String(rec.overtimeReason).trim());
}

function buildRecordNote(rec) {
  if (!rec) return '—';
  const parts = [];
  if (rec.lateFlag) {
    const late = rec.lateNote && String(rec.lateNote).trim();
    parts.push(late ? `遅早：${late}` : '遅早');
  }
  if (hasOvertimeReasonOrTime(rec)) {
    const reason = overtimeReasonLabel(rec.overtimeReason);
    const otNote = rec.overtimeNote && String(rec.overtimeNote).trim();
    let ot = reason ? `残業：${reason}` : '残業';
    if (otNote) ot += `（${otNote}）`;
    parts.push(ot);
  }
  if (rec.holidayWorkFlag) parts.push('休日出勤');
  if (rec.status === 'absence') {
    const reason = rec.absenceReason === 'sick' ? '病欠' : rec.absenceReason === 'other' ? 'その他' : '';
    if (reason) parts.push(reason);
    if (rec.absenceNote && String(rec.absenceNote).trim()) parts.push(String(rec.absenceNote).trim());
  }
  if (rec.memo && String(rec.memo).trim()) parts.push(String(rec.memo).trim());
  return parts.length ? parts.join('／') : '—';
}

function buildPersonalNote(rec) {
  return buildRecordNote(rec);
}

function fmtDateShort(dateStr) {
  const [, m, d] = dateStr.split('-').map(Number);
  return `${m}/${d}`;
}

function fmtDow(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return DOW_LABELS[new Date(y, m - 1, d).getDay()];
}

function buildPersonalDayRow(dateStr, rec) {
  if (!rec) {
    return {
      dateKey: dateStr,
      date: fmtDateShort(dateStr),
      dow: fmtDow(dateStr),
      status: '—',
      shift: '—',
      time: '—',
      brk: '—',
      work: '—',
      ot: '',
      note: '—',
      empty: true
    };
  }
  return {
    dateKey: dateStr,
    date: fmtDateShort(dateStr),
    dow: fmtDow(dateStr),
    status: personalStatusLabel(rec),
    shift: rec.status === 'work' ? shiftLabel(rec.shiftKey) : '—',
    time: rec.status === 'work' ? fmtTimeRange(rec.start, rec.end) : '—',
    brk: rec.status === 'work' ? fmtDurJa(rec.breakMin) : '—',
    work: rec.status === 'work' ? fmtDurJa(rec.workMin) : '—',
    ot: rec.status === 'work' && Number(rec.overtimeMin) > 0 ? fmtDurJa(rec.overtimeMin) : '',
    note: buildPersonalNote(rec),
    empty: false
  };
}

function buildPersonalDetailData(staff) {
  const recs = recordsForStaff(staff.staffId);
  const recMap = {};
  recs.forEach(r => { if (r.date) recMap[r.date] = r; });
  const rows = periodDates(period.from, period.to).map(d => buildPersonalDayRow(d, recMap[d]));
  const agg = aggregateRecords(recs);
  return { staff, rows, agg };
}

  return `<div class="personal-page">
    <div class="personal-page-title">${esc(staff.name)}（${esc(facilityLabel(staff.facilityId))}・${esc(job)}）</div>
    <div class="personal-page-sub">${esc(period.label)}（${esc(period.rangeLabel)}）</div>
    ${buildPersonalTableHtml(rows)}
    <div class="personal-totals">${personalTotalsHtml(agg)}</div>
  </div>`;
}

function uniqueSheetName(name, used) {
  let base = String(name || 'シート').replace(/[\\/?*[\]:]/g, '').slice(0, 28);
  if (!base) base = 'シート';
  let candidate = base;
  let n = 2;
  while (used.has(candidate)) {
    const suffix = `_${n}`;
    candidate = base.slice(0, 31 - suffix.length) + suffix;
    n++;
  }
  used.add(candidate);
  return candidate;
}

function csvEscape(cell) {
  const s = String(cell ?? '');
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function statusTag(rec) {
  if (rec.status === 'paid_leave') return { cls: 'tag-paid', text: '有給' };
  if (rec.status === 'absence') return { cls: 'tag-abs', text: '欠勤' };
  if (rec.status === 'work' && rec.holidayWorkFlag) return { cls: 'tag-hol', text: '休出' };
  return { cls: 'tag-work', text: '通常' };
}

function aggregateRecords(records) {
  let workDays = 0, holDays = 0, paidDays = 0, absDays = 0;
  let workMin = 0, otMin = 0, lateCount = 0;
  let hasMemo = false;
  records.forEach(r => {
    if (r.memo && String(r.memo).trim()) hasMemo = true;
    if (r.status === 'work') {
      workDays++;
      if (r.holidayWorkFlag) holDays++;
      workMin += Number(r.workMin) || 0;
      otMin += Number(r.overtimeMin) || 0;
      if (r.lateFlag) lateCount++;
    } else if (r.status === 'paid_leave') {
      paidDays++;
    } else if (r.status === 'absence') {
      absDays++;
    }
  });
  return { workDays, holDays, paidDays, absDays, workMin, otMin, lateCount, hasMemo };
}

function countPaidLeaveConsumed(records, asOf) {
  return records.filter(r => {
    if (r.status !== 'paid_leave') return false;
    if (!asOf) return true;
    return r.date > asOf;
  }).length;
}

function calcPaidLeaveRemaining(staff, consumedRecords) {
  if (staff.paidLeaveBalance === null || staff.paidLeaveBalance === undefined || staff.paidLeaveBalance === '') return null;
  const balance = Number(staff.paidLeaveBalance);
  if (isNaN(balance)) return null;
  const consumed = countPaidLeaveConsumed(consumedRecords, staff.paidLeaveAsOf || '');
  return balance - consumed;
}

/* ── GAS ── */
async function fetchStaff() {
  const url = `${GAS_URL}?type=staff`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('スタッフ情報の取得に失敗しました。');
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'スタッフ情報の取得に失敗しました。');
  return data.staff || {};
}

async function fetchAllRecordsByPeriod(from, to) {
  const url = `${GAS_URL}?type=allRecordsByPeriod&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('勤務記録の取得に失敗しました。');
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || '勤務記録の取得に失敗しました。');
  return data.records || [];
}

/** 記録の保存・削除など doPost 向け（upsert と同じ送り方） */
async function postToGas(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

const PAID_LEAVE_DEFAULT_FROM = '2020-01-01';
const periodDataCache = new Map();

function periodCacheKey(p) {
  return `${p.from}_${p.to}`;
}

function minDateStr(a, b) {
  return a < b ? a : b;
}

function maxDateStr(a, b) {
  return a > b ? a : b;
}

function staffHasPaidLeaveBalance(staff) {
  return staff.paidLeaveBalance !== null && staff.paidLeaveBalance !== undefined && staff.paidLeaveBalance !== '';
}

function paidLeaveFromForStaff(staff) {
  return staff.paidLeaveAsOf ? addDays(staff.paidLeaveAsOf, 1) : PAID_LEAVE_DEFAULT_FROM;
}

function computeDataFetchRange(staffList, p) {
  const today = todayStr();
  let from = p.from;
  let to = maxDateStr(p.to, today);
  staffList.forEach(staff => {
    if (!staffHasPaidLeaveBalance(staff)) return;
    from = minDateStr(from, paidLeaveFromForStaff(staff));
  });
  return { from, to };
}

function splitFetchedRecords(allRecords, p, staffList) {
  const today = todayStr();
  const records = allRecords.filter(r => r.date >= p.from && r.date <= p.to);
  const paidMap = {};
  staffList.forEach(staff => {
    if (!staffHasPaidLeaveBalance(staff)) {
      paidMap[staff.staffId] = [];
      return;
    }
    const from = paidLeaveFromForStaff(staff);
    paidMap[staff.staffId] = allRecords.filter(r =>
      r.staffId === staff.staffId && r.date >= from && r.date <= today
    );
  });
  return { periodRecords: records, paidLeaveRecordsMap: paidMap };
}

function applyTodayRecordsFromAll(allRecords) {
  const today = todayStr();
  todayRecords = allRecords.filter(r => r.date === today);
  todayDataLoaded = true;
  todayLoading = false;
  todayLoadError = null;
}

function snapshotPeriodCache() {
  return {
    staffMap: { ...staffMap },
    periodRecords: periodRecords.slice(),
    paidLeaveRecordsMap: Object.fromEntries(
      Object.entries(paidLeaveRecordsMap).map(([k, v]) => [k, v.slice()])
    ),
    todayRecords: todayRecords.slice()
  };
}

function restorePeriodCache(cached) {
  staffMap = cached.staffMap;
  periodRecords = cached.periodRecords;
  paidLeaveRecordsMap = cached.paidLeaveRecordsMap;
  todayRecords = cached.todayRecords;
  todayDataLoaded = true;
  todayLoading = false;
  todayLoadError = null;
}

function syncPeriodCacheFromMemory() {
  const key = periodCacheKey(period);
  if (!periodDataCache.has(key)) return;
  periodDataCache.set(key, snapshotPeriodCache());
}

function clearPeriodDataCache() {
  periodDataCache.clear();
  todayDataLoaded = false;
}

const $ = id => document.getElementById(id);

function facilityLabel(id) {
  return FACILITY_LABELS[id] || id || '—';
}

function facilityFilterLabel() {
  return facilityFilter === 'all' ? '全て' : (FACILITY_SHORT[facilityFilter] || facilityFilter);
}

function filteredStaffList() {
  return Object.values(staffMap)
    .filter(s => s.active !== false)
    .filter(s => facilityFilter === 'all' || s.facilityId === facilityFilter)
    .sort((a, b) => {
      const fa = FACILITY_ORDER.indexOf(a.facilityId);
      const fb = FACILITY_ORDER.indexOf(b.facilityId);
      if (fa !== fb) return (fa < 0 ? 99 : fa) - (fb < 0 ? 99 : fb);
      return (a.name || '').localeCompare(b.name || '', 'ja');
    });
}

function recordsForStaff(staffId) {
  return periodRecords.filter(r => r.staffId === staffId);
}

function fmtOtDisplay(min) {
  const n = Number(min) || 0;
  return n > 0 ? H(n) : '—';
}

function buildTodayRows() {
  return todayRecords
    .map(rec => ({ rec, staff: staffMap[rec.staffId] }))
    .filter(({ staff }) => facilityFilter === 'all' || (staff && staff.facilityId === facilityFilter))
    .sort((a, b) => {
      const fa = FACILITY_ORDER.indexOf(a.staff?.facilityId);
      const fb = FACILITY_ORDER.indexOf(b.staff?.facilityId);
      if (fa !== fb) return (fa < 0 ? 99 : fa) - (fb < 0 ? 99 : fb);
      const na = a.staff?.name || a.rec.staffId || '';
      const nb = b.staff?.name || b.rec.staffId || '';
      return na.localeCompare(nb, 'ja');
    });
}

function buildSummaryRows() {
  const staffList = filteredStaffList();
  return staffList.map(staff => {
    const recs = recordsForStaff(staff.staffId);
    const agg = aggregateRecords(recs);
    const paidRemain = calcPaidLeaveRemaining(staff, paidLeaveRecordsMap[staff.staffId] || []);
    return { staff, recs, agg, paidRemain };
  });
}

    renderSummaryError(loadError);
    return;
  }
  if (loading) {
    $('summaryDupAlert').style.display = 'none';
    $('summaryDupAlert').innerHTML = '';
    $('summaryMemoAlert').style.display = 'none';
    $('summaryMemoAlert').innerHTML = '';
    $('summaryStatus').style.display = 'block';
    $('summaryStatus').className = 'status-msg';
    $('summaryStatus').textContent = '読み込み中…';
    $('summaryTableWrap').style.display = 'none';
    return;
  }

  const rows = buildSummaryRows();
  const { dupRecordKeys, alerts } = detectShiftDuplicates(periodRecords);
  renderDupAlert('summaryDupAlert', alerts);
  renderMemoAlert('summaryMemoAlert', periodRecords);

  if (!rows.length) {
    $('summaryStatus').style.display = 'block';
    $('summaryStatus').className = 'status-msg';
    $('summaryStatus').textContent = '対象スタッフがありません';
    $('summaryTableWrap').style.display = 'none';
    return;
  }

  $('summaryStatus').style.display = 'none';
  $('summaryTableWrap').style.display = 'block';

  const tbody = $('summaryBody');
  tbody.innerHTML = '';

  rows.forEach(({ staff, recs, agg, paidRemain }) => {
    const tr = document.createElement('tr');
    tr.className = 'sum-row' + (expandedStaffId === staff.staffId ? ' expanded' : '');
    tr.dataset.staffId = staff.staffId;

    const paidDisplay = paidRemain === null ? '—' : String(paidRemain);
    const hasDup = recs.some(r => isDupRecord(r, dupRecordKeys));
    let noteMark = agg.hasMemo ? '<span class="note-mark" title="特記事項あり">●</span>' : '';
    if (hasDup) noteMark += '<span class="dup-mark" title="シフト重複あり">⚠</span>';

    tr.innerHTML = `
      <td><span class="chevron">›</span></td>
      <td>${noteMark}${esc(staff.name)}</td>
      <td>${esc(facilityLabel(staff.facilityId))}</td>
      <td>${esc(JOB_LABELS[staff.jobType] || staff.jobType || '—')}</td>
      <td class="num">${agg.workDays}</td>
      <td class="num">${agg.holDays}</td>
      <td class="num">${agg.paidDays}</td>
      <td class="num">${agg.absDays}</td>
      <td class="num">${H(agg.workMin)}</td>
      <td class="num">${H(agg.otMin)}</td>
      <td class="num">${agg.lateCount}</td>
      <td class="num">${paidDisplay}</td>
    `;

    tr.addEventListener('click', () => {
      expandedStaffId = expandedStaffId === staff.staffId ? null : staff.staffId;
      renderSummary();
    });

    tbody.appendChild(tr);

    if (expandedStaffId === staff.staffId) {
      const detailTr = document.createElement('tr');
      detailTr.className = 'detail-row';
      const sorted = recs.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      let detailHtml = '<div class="detail-inner"><table class="detail-table"><thead><tr>';
      detailHtml += '<th>日付</th><th>区分</th><th>シフト</th><th class="num">実働</th><th class="num">残業</th><th>特記事項</th></tr></thead><tbody>';
      if (!sorted.length) {
        detailHtml += '<tr><td colspan="6" style="color:#6b6562">記録なし</td></tr>';
      } else {
        sorted.forEach(rec => {
          const tag = statusTag(rec);
          const shift = rec.status === 'work' ? esc(shiftLabel(rec.shiftKey)) : '—';
          const work = rec.status === 'work' ? H(rec.workMin) : '—';
          const ot = rec.status === 'work' && Number(rec.overtimeMin) > 0 ? H(rec.overtimeMin) : '—';
          const note = buildRecordNote(rec);
          const noteDisplay = note === '—' ? '' : esc(note);
          const dupCls = isDupRecord(rec, dupRecordKeys) ? ' class="dup-row"' : '';
          detailHtml += `<tr${dupCls}>
            <td>${fmtDateWithDow(rec.date)}</td>
            <td><span class="tag ${tag.cls}">${tag.text}</span></td>
            <td>${shift}</td>
            <td class="num">${work}</td>
            <td class="num">${ot}</td>
            <td>${noteDisplay}</td>
          </tr>`;
        });
      }
      detailHtml += '</tbody></table></div>';
      detailTr.innerHTML = `<td colspan="12">${detailHtml}</td>`;
      tbody.appendChild(detailTr);
    }
  });
}

function exportFileName(ext) {

function exportCsv() {
  if (loading || loadError) return;
  if (activeTab === 'personal') {
    exportPersonalCsv();
    return;
  }
  const rows = exportRows();
  if (!rows.length) return;
  const lines = [EXPORT_HEADERS.join(',')];
  rows.forEach(row => {
    lines.push(row.map(cell => csvEscape(cell)).join(','));
  });
  const bom = '\uFEFF';
  const blob = new Blob([bom + lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, exportFileName('csv'));
}

function exportPersonalCsv() {
  const list = buildPersonalExportList();
  if (!list.length) return;
  const lines = [];
  list.forEach(({ staff, rows, agg }, i) => {
    if (i > 0) lines.push('');
    const job = JOB_LABELS[staff.jobType] || staff.jobType || '';
    lines.push(['氏名', '事業所', '職種', '月度'].map(csvEscape).join(','));
    lines.push([staff.name || '', facilityLabel(staff.facilityId), job, period.label].map(csvEscape).join(','));
    lines.push(PERSONAL_HEADERS.map(csvEscape).join(','));
    rows.forEach(row => lines.push(personalRowToArray(row).map(csvEscape).join(',')));
    lines.push(['合計', '', '', '', '', '', '', '', personalTotalsText(agg)].map(csvEscape).join(','));
  });
  const bom = '\uFEFF';
  const blob = new Blob([bom + lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, personalExportFileName('csv'));
}

function exportXlsx() {
  if (loading || loadError) return;
  if (typeof XLSX === 'undefined') {
    alert('Excel出力ライブラリの読み込みに失敗しました。ページを再読込してください。');
    return;
  }
  if (activeTab === 'personal') {
    exportPersonalXlsx();
    return;
  }
  const rows = exportRows();
  if (!rows.length) return;

  const title = `${period.label} 勤務集計表／${facilityFilterLabel()}`;
  const aoa = [
    [title],
    [],
    EXPORT_HEADERS,
    ...rows
  ];

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: EXPORT_HEADERS.length - 1 } }];

  const colWidths = EXPORT_HEADERS.map((h, ci) => {
    let max = h.length;
    rows.forEach(r => {
      const len = String(r[ci] ?? '').length;
      if (len > max) max = len;
    });
    return { wch: Math.min(Math.max(max + 2, 8), 28) };
  });
  ws['!cols'] = colWidths;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '勤務集計');
  XLSX.writeFile(wb, exportFileName('xlsx'));
}

function exportPersonalXlsx() {
  const list = buildPersonalExportList();
  if (!list.length) return;
  const wb = XLSX.utils.book_new();
  const usedNames = new Set();

  list.forEach(({ staff, rows, agg }) => {
    const job = JOB_LABELS[staff.jobType] || staff.jobType || '';
    const title = `${staff.name}（${facilityLabel(staff.facilityId)}・${job}）`;
    const sub = `${period.label}（${period.rangeLabel}）`;
    const aoa = [
      [title],
      [sub],
      [],
      PERSONAL_HEADERS,
      ...rows.map(personalRowToArray),
      [],
      ['合計', '', '', '', '', '', '', '', personalTotalsText(agg)]
    ];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges'] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: PERSONAL_HEADERS.length - 1 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: PERSONAL_HEADERS.length - 1 } }
    ];
    ws['!cols'] = PERSONAL_HEADERS.map((h, ci) => {
      let max = h.length;
      rows.forEach(r => {
        const val = personalRowToArray(r)[ci];
        const len = String(val ?? '').length;
        if (len > max) max = len;
      });
      return { wch: Math.min(Math.max(max + 2, 6), 24) };
    });
    XLSX.utils.book_append_sheet(wb, ws, uniqueSheetName(staff.name, usedNames));
  });

  XLSX.writeFile(wb, personalExportFileName('xlsx'));
}

function doPrint() {
  if (activeTab === 'personal') {
    if (loading || loadError) return;
    buildPersonalPrintArea();
    document.body.classList.add('print-personal');
    const cleanup = () => {
      document.body.classList.remove('print-personal');
      $('personalPrintArea').innerHTML = '';
    };
    window.addEventListener('afterprint', cleanup, { once: true });
    window.print();
    return;
  }
  document.body.classList.remove('print-personal');
  window.print();
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

/* ── データ読込 ── */
function addDays(dateStr, delta) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d + delta);
  return ymd(dt);
}

async function loadTodayData(forceRefresh = false) {
  if (todayLoading) return;
  if (!forceRefresh && todayDataLoaded) {
    renderToday();
    return;
  }
  todayLoading = true;
  todayLoadError = null;
  todayDataLoaded = false;
  renderToday();

  try {
    const today = todayStr();
    if (!Object.keys(staffMap).length) {
      staffMap = await fetchStaff();
    }
    todayRecords = await fetchAllRecordsByPeriod(today, today);
    todayDataLoaded = true;
    todayLoading = false;
    renderToday();
  } catch (e) {
    todayLoading = false;
    todayDataLoaded = false;
    todayLoadError = e.message || 'データの取得に失敗しました。';
    renderToday();
  }
}

async function loadData(forceRefresh = false) {
  if (loading) return;
  const cacheKey = periodCacheKey(period);

  if (!forceRefresh && periodDataCache.has(cacheKey)) {
    restorePeriodCache(periodDataCache.get(cacheKey));
    renderSummary();
    renderToday();
    renderPersonal();
    return;
  }

  loading = true;
  loadError = null;
  renderSummary();

  try {
    const staff = await fetchStaff();
    staffMap = staff;
    const staffList = Object.values(staffMap).filter(s => s.active !== false);
    const { from, to } = computeDataFetchRange(staffList, period);
    const allRecords = await fetchAllRecordsByPeriod(from, to);
    const split = splitFetchedRecords(allRecords, period, staffList);
    periodRecords = split.periodRecords;
    paidLeaveRecordsMap = split.paidLeaveRecordsMap;
    applyTodayRecordsFromAll(allRecords);

    periodDataCache.set(cacheKey, snapshotPeriodCache());

    loading = false;
    renderSummary();
    renderToday();
    renderPersonal();
  } catch (e) {
    loading = false;
    loadError = e.message || 'データの取得に失敗しました。';
    renderSummary();
    renderPersonal();
  }
}

function changePeriod(delta) {
  period = delta < 0 ? prevPeriod(period) : nextPeriod(period);
  expandedStaffId = null;
  selectedPersonalStaffId = null;
  renderHeader();
  loadData();
}

/* ── 記録訂正 ── */
let editDate = '';
let editStaffId = '';
let editOrigRecord = null;
let editSaving = false;

function findPeriodRecord(date, staffId) {
  return periodRecords.find(r => r.date === date && String(r.staffId) === String(staffId)) || null;
}

function applyHonbuCorrectionMemo(memo, today) {
  const stamp = `【本部訂正 ${today}】`;
  const m = String(memo || '').trim();
  if (m.includes(stamp)) return m;
  return m ? `${stamp}${m}` : stamp;
}

function readEditCalc() {
  const shiftKey = $('editShift').value;
  const shift = shiftMaster[shiftKey];
  const startMin = Number($('editStart').value) || 0;
  const endMin = parseEndSelectValue($('editEnd').value);
  const breakMin = Number($('editBreak').value) || 0;
  const work = computeWorkMin(startMin, endMin, breakMin);
  const ot = computeOvertime(work, shift ? shift.workMin : 0);
  return { startMin, endMin, breakMin, work, ot, shift };
}

function updateEditFormVisibility() {
  const status = $('editStatus').value;
  $('editWorkSection').classList.toggle('show', status === 'work');
  $('editAbsSection').classList.toggle('show', status === 'absence');
  $('editPaidHint').style.display = status === 'paid_leave' ? 'block' : 'none';
  $('editLateNoteWrap').style.display = $('editLateFlag').checked && status === 'work' ? 'block' : 'none';
  const { ot } = status === 'work' ? readEditCalc() : { ot: 0 };
  const showOt = status === 'work' && ot >= OVERTIME_THRESHOLD_MIN;
  $('editOtSection').classList.toggle('show', showOt);
  $('editOtNoteWrap').style.display = showOt && $('editOtReason').value === 'other' ? 'block' : 'none';
  $('editAbsNoteWrap').style.display = status === 'absence' && $('editAbsReason').value === 'other' ? 'block' : 'none';
  if (status === 'work') {
    const { work, ot: otMin } = readEditCalc();
    $('editCalc').textContent = `実働 ${fmtDurJa(work)}　残業 ${otMin > 0 ? fmtDurJa(otMin) : '—'}`;
  }
}

function applyShiftDefaults(shiftKey) {
  const shift = shiftMaster[shiftKey];
  if (!shift) return;
  $('editStart').value = String(shift.start);
  $('editEnd').value = endSelectValue(shift.start, shift.end);
  $('editBreak').value = String(shift.breakMin || 0);
  updateEditFormVisibility();
}

function populateEditOtReasonSelect(selected) {
  const sel = $('editOtReason');
  sel.innerHTML = '<option value="">— 選択 —</option>';
  Object.entries(OVERTIME_REASON_LABEL).forEach(([k, label]) => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = label;
    sel.appendChild(opt);
  });
  if (selected && !OVERTIME_REASON_LABEL[selected] && /[\u3040-\u30ff\u4e00-\u9fff]/.test(selected)) {
    const opt = document.createElement('option');
    opt.value = selected;
    opt.textContent = selected;
    sel.appendChild(opt);
  }
  sel.value = selected || '';
}

function openEditModal(dateStr) {
  const staff = selectedPersonalStaffId ? staffMap[selectedPersonalStaffId] : null;
  if (!staff) return;
  editDate = dateStr;
  editStaffId = staff.staffId;
  editOrigRecord = findPeriodRecord(dateStr, staff.staffId);
  const rec = editOrigRecord;
  const shifts = shiftsForStaff(staff);

  $('editModalTitle').textContent = `記録の訂正 — ${staff.name || staff.staffId}`;
  $('editDate').value = fmtDateWithDow(dateStr);
  $('editErr').classList.remove('show');
  $('editErr').textContent = '';

  const shiftSel = $('editShift');
  shiftSel.innerHTML = shifts.map(s =>
    `<option value="${s.shiftKey}">${esc(s.label)}</option>`
  ).join('');

  const defaultShift = rec?.shiftKey || staff.defaultShiftKey || (shifts[0] && shifts[0].shiftKey) || '';
  if (defaultShift) shiftSel.value = defaultShift;

  $('editStatus').value = rec?.status || 'work';

  const startMin = rec?.start != null && rec.start !== '' ? Number(rec.start) : (shiftMaster[defaultShift]?.start ?? 510);
  const endMin = rec?.end != null && rec.end !== '' ? Number(rec.end) : (shiftMaster[defaultShift]?.end ?? 1050);
  $('editStart').value = String(startMin);
  $('editEnd').value = endSelectValue(startMin, endMin);
  $('editBreak').value = String(rec?.breakMin != null && rec.breakMin !== '' ? rec.breakMin : (shiftMaster[defaultShift]?.breakMin ?? 60));

  $('editLateFlag').checked = !!(rec?.lateFlag);
  $('editHolidayWorkFlag').checked = !!(rec?.holidayWorkFlag);
  $('editLateNote').value = rec?.lateNote || '';
  populateEditOtReasonSelect(rec?.overtimeReason || '');
  $('editOtNote').value = rec?.overtimeNote || '';
  $('editAbsReason').value = rec?.absenceReason || '';
  $('editAbsNote').value = rec?.absenceNote || '';
  $('editMemo').value = rec?.memo || '';

  updateEditFormVisibility();
  const hasRec = !!editOrigRecord;
  $('editDeleteWrap').style.display = hasRec ? 'block' : 'none';
  $('editDelete').disabled = false;
  $('editDelete').textContent = 'この記録を削除（公休に戻す）';
  $('editOverlay').classList.add('open');
  $('editOverlay').setAttribute('aria-hidden', 'false');
}

function closeEditModal() {
  $('editOverlay').classList.remove('open');
  $('editOverlay').setAttribute('aria-hidden', 'true');
}

function validateEditForm() {
  const status = $('editStatus').value;
  if (status === 'work') {
    if (!$('editShift').value) return 'シフトを選んでください。';
    const { ot } = readEditCalc();
    if ($('editLateFlag').checked && isEmpty($('editLateNote').value)) {
      return '遅刻・早退の理由を入力してください。';
    }
    if (ot >= OVERTIME_THRESHOLD_MIN) {
      if (!$('editOtReason').value) return '残業が1時間以上です。残業理由を選んでください。';
      if ($('editOtReason').value === 'other' && isEmpty($('editOtNote').value)) {
        return '「その他」の残業理由を入力してください。';
      }
    }
  }
  if (status === 'absence') {
    if (!$('editAbsReason').value) return '欠勤の理由を選んでください。';
    if ($('editAbsReason').value === 'other' && isEmpty($('editAbsNote').value)) {
      return '「その他」の欠勤理由を入力してください。';
    }
  }
  return '';
}

function buildEditRecord() {
  const status = $('editStatus').value;
  const orig = editOrigRecord || {};
  const shiftKey = $('editShift').value;
  const { startMin, endMin, breakMin, work, ot } = readEditCalc();
  const lateFlag = $('editLateFlag').checked;
  const showOt = status === 'work' && ot >= OVERTIME_THRESHOLD_MIN;
  const otReason = $('editOtReason').value || null;
  let memo = $('editMemo').value.trim();
  memo = applyHonbuCorrectionMemo(memo, todayStr());

  return {
    date: editDate,
    staffId: editStaffId,
    status,
    shiftKey: status === 'work' ? shiftKey : (orig.shiftKey || shiftKey || ''),
    start: status === 'work' ? startMin : (orig.start ?? ''),
    end: status === 'work' ? endMin : (orig.end ?? ''),
    breakMin: status === 'work' ? breakMin : (orig.breakMin ?? ''),
    workMin: status === 'work' ? work : 0,
    overtimeMin: status === 'work' ? ot : 0,
    lateFlag: status === 'work' && lateFlag,
    lateNote: status === 'work' && lateFlag ? $('editLateNote').value.trim() : '',
    holidayWorkFlag: status === 'work' && $('editHolidayWorkFlag').checked,
    absenceReason: status === 'absence' ? $('editAbsReason').value : null,
    absenceNote: status === 'absence' ? $('editAbsNote').value.trim() : '',
    overtimeReason: showOt ? otReason : null,
    overtimeNote: showOt && otReason === 'other' ? $('editOtNote').value.trim() : '',
    memo,
    approvalStatus: orig.approvalStatus || '',
    approvedBy: orig.approvedBy || '',
    approvedAt: orig.approvedAt || '',
    createdBy: orig.createdBy || editStaffId,
    createdAt: orig.createdAt || new Date().toISOString()
  };
}

async function saveEditRecord() {
  if (editSaving) return;
  const err = validateEditForm();
  if (err) {
    $('editErr').textContent = err;
    $('editErr').classList.add('show');
    return;
  }
  $('editErr').classList.remove('show');
  const record = buildEditRecord();
  editSaving = true;
  $('editSave').disabled = true;
  $('editDelete').disabled = true;
  $('editSave').textContent = '保存中…';
  try {
    const data = await postToGas(record);
    if (!data || !data.ok) throw new Error(data?.error || '保存に失敗しました。');
    const saved = data.record || record;
    const idx = periodRecords.findIndex(r => r.date === saved.date && String(r.staffId) === String(saved.staffId));
    if (idx >= 0) periodRecords[idx] = saved;
    else periodRecords.push(saved);
    if (saved.date === todayStr()) {
      const ti = todayRecords.findIndex(r => r.date === saved.date && String(r.staffId) === String(saved.staffId));
      if (ti >= 0) todayRecords[ti] = saved;
      else todayRecords.push(saved);
    }
    syncPeriodCacheFromMemory();
    closeEditModal();
    renderPersonal();
    renderSummary();
    renderToday();
  } catch (e) {
    $('editErr').textContent = String(e.message || e);
    $('editErr').classList.add('show');
  } finally {
    editSaving = false;
    $('editSave').disabled = false;
    $('editSave').textContent = '保存';
    if (editOrigRecord) $('editDelete').disabled = false;
  }
}

async function deleteEditRecord() {
  if (editSaving) return;
  if (!editOrigRecord) {
    $('editErr').textContent = '削除する記録がありません。';
    $('editErr').classList.add('show');
    return;
  }
  const msg = 'この記録を削除すると元に戻せません。\nこの日を公休（空白）に戻します。よろしいですか？';
  if (!confirm(msg)) return;

  editSaving = true;
  $('editSave').disabled = true;
  $('editDelete').disabled = true;
  $('editDelete').textContent = '削除中…';
  $('editErr').classList.remove('show');
  $('editErr').textContent = '';

  try {
    const payload = {
      type: 'recordDelete',
      date: editOrigRecord.date || editDate,
      staffId: editOrigRecord.staffId != null ? editOrigRecord.staffId : editStaffId
    };
    const data = await postToGas(payload);

    if (!data || !data.ok) {
      $('editErr').textContent = formatDeleteError(data?.error);
      $('editErr').classList.add('show');
      return;
    }

    const deleted = data.result?.deleted;
    if (deleted) {
      removeRecordFromCache(editDate, editStaffId);
      closeEditModal();
      renderPersonal();
      renderSummary();
      renderToday();
      return;
    }

    removeRecordFromCache(editDate, editStaffId);
    closeEditModal();
    alert('この記録はすでに存在しません。表示を更新しました。');
    renderPersonal();
    renderSummary();
    renderToday();
  } catch (e) {
    $('editErr').textContent = String(e.message || e);
    $('editErr').classList.add('show');
  } finally {
    editSaving = false;
    $('editSave').disabled = false;
    $('editDelete').disabled = false;
    $('editDelete').textContent = 'この記録を削除（公休に戻す）';
  }
}

function initEditModal() {
  fillTimeSelect($('editStart'), false);
  fillTimeSelect($('editEnd'), true);
  populateEditOtReasonSelect('');

  ['editStatus', 'editShift', 'editStart', 'editEnd', 'editBreak', 'editLateFlag', 'editOtReason', 'editAbsReason'].forEach(id => {
    $(id).addEventListener('change', () => {
      if (id === 'editShift') applyShiftDefaults($('editShift').value);
      updateEditFormVisibility();
    });
  });
  $('editLateNote').addEventListener('input', updateEditFormVisibility);
  $('editOtNote').addEventListener('input', updateEditFormVisibility);
  $('editAbsNote').addEventListener('input', updateEditFormVisibility);
  $('editCancel').addEventListener('click', closeEditModal);
  $('editSave').addEventListener('click', saveEditRecord);
  $('editDelete').addEventListener('click', deleteEditRecord);
}

/* ── 初期化 ── */
function init() {
  const verEl = $('appVersion');
  if (verEl) {
    verEl.textContent = 'v' + APP_VERSION;
    verEl.title = APP_VERSION_NOTES;
  }
  renderHeader();

  $('btnPrevPeriod').addEventListener('click', () => changePeriod(-1));
  $('btnNextPeriod').addEventListener('click', () => changePeriod(1));
  $('btnReload').addEventListener('click', () => {
    clearPeriodDataCache();
    loadData(true);
  });
  $('btnCsv').addEventListener('click', exportCsv);
  $('btnXlsx').addEventListener('click', exportXlsx);
  $('btnPrint').addEventListener('click', doPrint);

  $('personalStaffSelect').addEventListener('change', () => {
    selectedPersonalStaffId = $('personalStaffSelect').value || null;
    renderPersonal();
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });

  initEditModal();
  loadData();
}

init();
</script>
